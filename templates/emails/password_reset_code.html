<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Code</title>
</head>
<body style="margin: 0; padding: 0; background-color: #131F24; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-font-smoothing: antialiased;">

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #131F24;">
        <tr>
            <td align="center" style="padding: 40px 16px;">

                <!-- Main Card -->
                <table role="presentation" width="500" cellpadding="0" cellspacing="0" border="0" style="max-width: 500px; width: 100%; background-color: #1A2F35; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 40px rgba(0,0,0,0.3);">

                    <!-- Top Gradient Bar -->
                    <tr>
                        <td style="height: 6px; border-radius: 24px 24px 0 0; background: linear-gradient(90deg, #FFC800, #FF6B35, #FF4B4B, #CE82FF);"></td>
                    </tr>

                    <!-- Logo -->
                    <tr>
                        <td align="center" style="padding: 36px 40px 0 40px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center" style="width: 56px; height: 56px; background-color: #58CC02; border-radius: 16px; box-shadow: 0 4px 0 #46A302;">
                                        <span style="font-size: 28px; line-height: 56px;">🎓</span>
                                    </td>
                                </tr>
                            </table>
                            <p style="margin: 12px 0 0 0; font-size: 20px; font-weight: 800; color: #FFFFFF;">
                                CEFR<span style="color: #58CC02;">Prep</span>
                            </p>
                        </td>
                    </tr>

                    <!-- Key Icon -->
                    <tr>
                        <td align="center" style="padding: 24px 0 0 0;">
                            <span style="font-size: 48px; line-height: 1;">🔑</span>
                        </td>
                    </tr>

                    <!-- Heading -->
                    <tr>
                        <td align="center" style="padding: 16px 40px 0 40px;">
                            <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: #FFFFFF; line-height: 1.3;">
                                Password Reset
                            </h1>
                        </td>
                    </tr>

                    <!-- Subtitle -->
                    <tr>
                        <td align="center" style="padding: 10px 40px 0 40px;">
                            <p style="margin: 0; font-size: 15px; font-weight: 600; color: #8BA5AE; line-height: 1.6;">
                                Enter this code to reset your password:
                            </p>
                        </td>
                    </tr>

                    <!-- CODE BOX -->
                    <tr>
                        <td align="center" style="padding: 28px 40px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center" style="background-color: rgba(255, 200, 0, 0.08); border: 2px solid rgba(255, 200, 0, 0.25); border-radius: 20px; padding: 20px 48px;">
                                        <p style="margin: 0; font-size: 40px; font-weight: 900; color: #FFC800; letter-spacing: 12px; font-family: 'Courier New', monospace;">
                                            {{ code }}
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Timer warning -->
                    <tr>
                        <td align="center" style="padding: 0 40px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center" style="background-color: rgba(255, 75, 75, 0.08); border: 1px solid rgba(255, 75, 75, 0.15); border-radius: 12px; padding: 12px 24px;">
                                        <p style="margin: 0; font-size: 13px; font-weight: 700; color: #FF4B4B;">
                                            ⏱ This code expires in 10 minutes
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding: 28px 40px 20px 40px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="height: 2px; background-color: #2B4D56; border-radius: 1px;"></td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 0 40px 30px 40px;">
                            <p style="margin: 0 0 6px 0; font-size: 12px; font-weight: 700; color: #56717A;">
                                If you didn't request a password reset, you can safely ignore this email.
                            </p>
                            <p style="margin: 0; font-size: 11px; font-weight: 600; color: #3D5A63;">
                                &copy; {{ year }} CEFRPrep
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>
</html>
