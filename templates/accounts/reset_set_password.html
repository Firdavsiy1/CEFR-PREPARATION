{% extends "base.html" %}

{% block title %}New Password — CEFR Prep{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full animate-slide-up">
        <!-- Card -->
        <div class="card-duo p-8 sm:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-5 rounded-2xl flex items-center justify-center bg-duo-green shadow-[0_4px_0_#46A302] animate-bounce-in">
                    <i class="ph-fill ph-lock-key-open text-white text-4xl"></i>
                </div>
                <h2 class="text-2xl font-black text-white mb-1" data-i18n="fp_newpw_title">Новый пароль</h2>
                <p class="text-duo-text-dim font-semibold text-sm" data-i18n="fp_newpw_subtitle">Придумайте новый пароль для вашего аккаунта</p>
                <p class="text-duo-green font-bold text-sm mt-2">{{ email }}</p>
            </div>

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <!-- New password -->
                <div>
                    <label class="block text-xs font-extrabold text-duo-text-dim mb-2 uppercase tracking-widest" data-i18n="new_password">Новый пароль</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="ph-fill ph-lock text-duo-text-muted text-lg"></i>
                        </div>
                        <input type="password" name="new_password1" required autofocus
                               class="input-duo w-full"
                               id="id_new_password1">
                    </div>
                    <p class="mt-1.5 text-xs text-duo-text-muted font-semibold" data-i18n="password_hint">Минимум 8 символов, не только цифры</p>
                </div>

                <!-- Confirm password -->
                <div>
                    <label class="block text-xs font-extrabold text-duo-text-dim mb-2 uppercase tracking-widest" data-i18n="confirm_password">Подтвердите пароль</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="ph-fill ph-lock text-duo-text-muted text-lg"></i>
                        </div>
                        <input type="password" name="new_password2" required
                               class="input-duo w-full"
                               id="id_new_password2">
                    </div>
                </div>

                <div class="pt-3">
                    <button type="submit" class="btn-duo-green w-full text-base !py-3.5">
                        <i class="ph-fill ph-check-circle text-lg"></i>
                        <span data-i18n="fp_set_password_btn">Установить пароль</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
