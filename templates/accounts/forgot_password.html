{% extends "base.html" %}

{% block title %}Forgot Password — CEFR Prep{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full animate-slide-up">
        <!-- Card -->
        <div class="card-duo p-8 sm:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-5 rounded-2xl flex items-center justify-center shadow-[0_4px_0_#D97706] animate-bounce-in" style="background: linear-gradient(135deg, #FFC800, #F59E0B);">
                    <i class="ph-fill ph-key text-white text-4xl"></i>
                </div>
                <h2 class="text-2xl font-black text-white mb-1" data-i18n="fp_title">Забыли пароль?</h2>
                <p class="text-duo-text-dim font-semibold text-sm" data-i18n="fp_subtitle">Введите ваш email и мы отправим код для сброса</p>
            </div>

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <!-- Email -->
                <div>
                    <label class="block text-xs font-extrabold text-duo-text-dim mb-2 uppercase tracking-widest" data-i18n="email_label">Электронная почта</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="ph-fill ph-envelope text-duo-text-muted text-lg"></i>
                        </div>
                        <input type="email" name="email" required autofocus
                               class="input-duo w-full"
                               data-i18n-placeholder="email_placeholder"
                               placeholder="example@email.com"
                               id="id_email">
                    </div>
                </div>

                <div class="pt-3">
                    <button type="submit" class="btn-duo-gold w-full text-base !py-3.5">
                        <i class="ph-fill ph-paper-plane-right text-lg"></i>
                        <span data-i18n="fp_send_code_btn">Отправить код</span>
                    </button>
                </div>
            </form>

            <div class="text-center mt-6 pt-6 border-t-2 border-duo-border">
                <p class="text-sm text-duo-text-dim font-semibold">
                    <span data-i18n="fp_remember">Вспомнили пароль?</span> <a href="{% url 'accounts:login' %}" class="font-extrabold text-duo-green hover:text-duo-gold transition-colors" data-i18n="auth_login_link">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
